%%writefile config.yaml
# ── Paths ────────────────────────────────────────────────────
data:
  root:          "data/"
  eo_name:       "pre_eo.tif"
  sar_name:      "post_sar.tif"
  mask_name:     "target.tif"
  nodata_eo:     0
  nodata_sar:    0
  eo_variants:   ["pre_eo.tif",  "pre_disaster.tif",  "preeo.tif"]
  sar_variants:  ["post_sar.tif","post_disaster.tif", "postsar.tif"]
  mask_variants: ["target.tif",  "mask.tif",          "label.tif"]

# ── Label remapping ──────────────────────────────────────────
label:
  needs_remap: false
  remap: {0: 0, 1: 0, 2: 1, 3: 1}

# ── Model ────────────────────────────────────────────────────
model:
  name:           "CrossModalChangeNet"
  base_channels:  64
  dropout:        0.1
  in_channels:    4

# ── Training ─────────────────────────────────────────────────
train:
  seed:           42
  patch_size:     256
  batch_size:     16
  num_workers:    2
  num_epochs:     80
  patience:       15
  grad_clip:      1.0
  mixed_precision: true

# ── Optimiser ────────────────────────────────────────────────
optimizer:
  name:           "AdamW"
  lr:             0.0001
  weight_decay:   0.0001

# ── LR Scheduler ─────────────────────────────────────────────
scheduler:
  name:           "CosineAnnealingLR"
  eta_min:        0.000001

# ── Loss ─────────────────────────────────────────────────────
loss:
  name:           "DiceFocal"
  dice_weight:    0.5
  focal_weight:   0.5
  focal_alpha:    0.75
  focal_gamma:    2.0

# ── Augmentation ─────────────────────────────────────────────
augmentation:
  random_crop:     true
  horizontal_flip: 0.5
  vertical_flip:   0.5
  random_rotate90: 0.5
  transpose:       0.3

# ── Output ───────────────────────────────────────────────────
norm_stats_path: "norm_stats.json"
output:
  checkpoint_dir: "checkpoints/"
  results_dir:    "results/"
  best_model:     "checkpoints/best_model.pth"
